<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SESSION KING GAGAN BHAI ™ </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-silk {
            background-image: url('https://i.pinimg.com/originals/79/e7/5d/79e75d6e0f0b67ef8110a7a877c1db94.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-silk min-h-screen flex items-center justify-center p-4 text-gray-900 dark:text-white transition-colors duration-300">

    <div class="w-full max-w-[400px] text-center">
        
        <!-- Profile Picture -->
        <div class="mx-auto w-28 h-28 mb-6 relative">
            <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
            <img src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69c52f061b85d4.93965036_Gemini_Generated_Image_dim1a3dim1a3dim1.png" 
                 class="relative w-full h-full rounded-full object-cover border-4 border-white dark:border-[#1c1c1e] shadow-xl">
            <div class="absolute bottom-2 right-1 bg-white dark:bg-black rounded-full p-1">
                <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path>
                </svg>
            </div>
        </div>

        <!-- Name -->
        <h1 class="text-3xl font-black mb-2 tracking-tight leading-none">
            SESSION KING GAGAN BHAI ™
        </h1>
        
        <!-- Description -->
        <p class="text-gray-500 dark:text-gray-400 font-medium mb-8">
            Join now for exclusive insights and daily tips.
        </p>

        <!-- Join Button -->
        <a href="https://t.me/+QpBJtPFvi6hhZjg9" id="joinBtn" 
           class="block w-full bg-[#0088cc] hover:bg-[#007ab8] text-white font-bold text-lg py-5 rounded-2xl shadow-xl shadow-blue-500/20 transition-all transform hover:scale-[1.02] active:scale-95 relative overflow-hidden">
            <span id="btnText">JOIN CHANNEL</span>
            <span id="btnLoad" class="hidden absolute inset-0 flex items-center justify-center bg-[#007ab8]">
                <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </span>
        </a>

        <!-- Footer Badges -->
        <div class="mt-8 flex justify-center gap-6 text-xs font-semibold text-gray-400 dark:text-gray-600 uppercase tracking-widest">
            <span class="flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg> Encrypted
            </span>
            <span class="flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg> Verified
            </span>
        </div>

    </div>

    <script>
        document.getElementById('joinBtn').addEventListener('click', function(e) {
            e.preventDefault();
            var url = this.href;
            document.getElementById('btnText').classList.add('opacity-0');
            document.getElementById('btnLoad').classList.remove('hidden');
            setTimeout(function() { 
                window.location.href = url; 
            }, 200);
        });
    </script>

</body>
</html>
